name: Build Executables

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: dist/UKOAI_Exam_Monitor.exe
          - os: macos-latest
            artifact: dist/UKOAI_Exam_Monitor.app
          - os: ubuntu-latest
            artifact: dist/UKOAI_Exam_Monitor

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build executable
        run: python build.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: UKOAI_Exam_Monitor-${{ runner.os }}
          path: ${{ matrix.artifact }}
